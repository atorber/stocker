name: Deploy via SSH

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag (default latest)'
        required: false
        default: latest

permissions:
  contents: read

env:
  IMAGE_NAME: stocker
  CONTAINER_NAME: stocker

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Update image on remote server
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          envs: IMAGE_NAME,CONTAINER_NAME
          script_stop: false
          script: |
            set -uo pipefail
            IMAGE_TAG="${{ inputs.image_tag }}"
            IMAGE_NAME="${{ env.IMAGE_NAME }}"
            CONTAINER_NAME="${{ env.CONTAINER_NAME }}"

            if ! docker container inspect "$CONTAINER_NAME" >/dev/null 2>&1; then
              echo "container not found: $CONTAINER_NAME"
              exit 1
            fi

            RUN_IMAGE=""
            for img in \
              "ghcr.io/atorber/${IMAGE_NAME}:${IMAGE_TAG}" \
              "docker.1ms.run/atorber/${IMAGE_NAME}:${IMAGE_TAG}" \
              "atorber/${IMAGE_NAME}:${IMAGE_TAG}"; do
              echo "Trying pull: $img"
              if docker pull "$img"; then
                RUN_IMAGE="$img"
                echo "Pulled successfully: $img"
                break
              fi
              echo "Pull failed: $img"
            done

            if [ -z "$RUN_IMAGE" ]; then
              echo "All image pull attempts failed"
              exit 1
            fi

            set -e
            echo "Recreating container with existing config: $CONTAINER_NAME"
            RESTART=$(docker inspect -f '{{.HostConfig.RestartPolicy.Name}}' "$CONTAINER_NAME")
            PORT=$(docker inspect -f '{{(index (index .NetworkSettings.Ports "8000/tcp") 0).HostPort}}' "$CONTAINER_NAME")

            ENV_ARGS=()
            while IFS= read -r env_line || [ -n "$env_line" ]; do
              [ -n "$env_line" ] || continue
              ENV_ARGS+=(-e "$env_line")
            done < <(docker inspect -f '{{range .Config.Env}}{{println .}}{{end}}' "$CONTAINER_NAME")

            docker stop "$CONTAINER_NAME"
            docker rm "$CONTAINER_NAME"

            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart "$RESTART" \
              -p "${PORT}:8000" \
              "${ENV_ARGS[@]}" \
              "$RUN_IMAGE"

            docker ps --filter "name=^/${CONTAINER_NAME}$"
