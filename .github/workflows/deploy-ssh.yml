name: Deploy via SSH

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag (default latest)'
        required: false
        default: latest

permissions:
  contents: read

env:
  IMAGE_REPO: atorber/stocker
  CONTAINER_NAME: stocker

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Update image on remote server
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_REPO: ${{ env.IMAGE_REPO }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          envs: IMAGE_REPO,IMAGE_TAG,CONTAINER_NAME
          script_stop: true
          script: |
            set -euo pipefail

            if ! docker container inspect "$CONTAINER_NAME" >/dev/null 2>&1; then
              echo "container not found: $CONTAINER_NAME"
              exit 1
            fi

            IMAGE_HUB="${IMAGE_REPO}:${IMAGE_TAG}"
            IMAGE_MIRROR="docker.1ms.run/${IMAGE_REPO}:${IMAGE_TAG}"
            RUN_IMAGE=""

            pull_image() {
              echo "Pulling image: $1"
              docker pull "$1"
            }

            if pull_image "$IMAGE_HUB"; then
              RUN_IMAGE="$IMAGE_HUB"
            elif pull_image "$IMAGE_MIRROR"; then
              RUN_IMAGE="$IMAGE_MIRROR"
              echo "Using mirror image: $RUN_IMAGE"
            else
              echo "Failed to pull from Docker Hub and mirror: $IMAGE_HUB"
              exit 1
            fi

            echo "Recreating container with existing config: $CONTAINER_NAME"
            RESTART=$(docker inspect -f '{{.HostConfig.RestartPolicy.Name}}' "$CONTAINER_NAME")
            PORT=$(docker inspect -f '{{(index (index .NetworkSettings.Ports "8000/tcp") 0).HostPort}}' "$CONTAINER_NAME")

            ENV_ARGS=()
            while IFS= read -r env_line || [ -n "$env_line" ]; do
              [ -n "$env_line" ] || continue
              ENV_ARGS+=(-e "$env_line")
            done < <(docker inspect -f '{{range .Config.Env}}{{println .}}{{end}}' "$CONTAINER_NAME")

            docker stop "$CONTAINER_NAME"
            docker rm "$CONTAINER_NAME"

            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart "$RESTART" \
              -p "${PORT}:8000" \
              "${ENV_ARGS[@]}" \
              "$RUN_IMAGE"

            docker ps --filter "name=^/${CONTAINER_NAME}$"
